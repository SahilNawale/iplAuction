    <div id="root"></div>

          $("#collapse3").collapse("hide");

          console.log("triggered");
          $("#collapse6").collapse("hide");
          $("#collapse9").collapse("hide");

        $("#bowl-death").click(function () {

          $("#collapse6").collapse("hide");
          $("#collapse7").collapse("hide");

    <script
